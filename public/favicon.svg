<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Neon Harvest">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08111e"/>
      <stop offset="100%" stop-color="#050913"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6cf3ff"/>
      <stop offset="100%" stop-color="#57c7ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#6cf3ff" stroke-width="0.5">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>
  <!-- Extraction ring + inner pulse (matches in-game extraction cue) -->
  <circle cx="32" cy="30" r="20" fill="none" stroke="url(#ring)" stroke-width="2.25"/>
  <circle cx="32" cy="30" r="12" fill="none" stroke="#6cf3ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Harvest shard pickup -->
  <path fill="#d4ff63" d="M32 14 L40 36 L24 36 Z"/>
  <path fill="none" stroke="#e7fbff" stroke-width="1.2" stroke-linejoin="round" d="M32 14 L40 36 L24 36 Z" opacity="0.85"/>
</svg>
